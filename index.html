<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1분 도전! OX 퀴즈 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="start-screen" class="screen">
            <h1>💡 1분 OX 퀴즈 챌린지</h1>
            <p>1분 동안 최대한 많은 문제를 맞혀보세요!</p>
            <input type="text" id="username" placeholder="이름을 입력하세요" maxlength="10">
            <button id="start-btn">게임 시작</button>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="game-header">
                <div class="timer">⏱️ 남은 시간: <span id="time-left">60</span>초</div>
                <div class="score">점수: <span id="current-score">0</span>점</div>
            </div>
            <div id="quiz-container">
                <p id="question-text">여기에 문제가 표시됩니다.</p>
            </div>
            <div class="quiz-buttons">
                <button id="btn-o" class="ox-btn btn-o">O</button>
                <button id="btn-x" class="ox-btn btn-x">X</button>
            </div>
        </div>

        <div id="result-screen" class="screen hidden">
            <h2>🎉 게임 종료!</h2>
            <p id="final-result">홍길동님의 최종 점수는 0점입니다.</p>
            
            <div class="ranking-box">
                <h3>🏆 실시간 랭킹 (Top 5)</h3>
                <ol id="ranking-list">
                    </ol>
            </div>
            <button id="restart-btn">다시 도전하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
